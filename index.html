<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autofill form</title>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" autocomplete="email"><br><br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" autocomplete="street-address"><br><br>
        <label for="tel">Phone Number:</label>
        <input type="tel" id="tel" name="tel" autocomplete="tel"><br><br>
        <input type="button" value="Autofill Form">
        

    </form>
    
</body>
</html>
