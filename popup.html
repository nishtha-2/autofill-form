<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFillAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Notification banner -->
<div id="notification-banner" role="alert" aria-live="polite"></div>

<!-- ── Auth gate: shown when logged out ──────────────────────────────────── -->
<div id="auth-gate" class="auth-gate" style="display:none;">
    <div class="brand-row">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
        </div>
        <span class="brand-name">AutoFill<span class="brand-accent">AI</span></span>
    </div>
    <p class="auth-gate-msg">Sign in to use AutoFillAI</p>
    <button class="btn btn--primary" id="open-auth-btn" onclick="openAuthPage()">
        Sign In / Create Account
    </button>
</div>

<!-- ── Main app: shown when logged in ────────────────────────────────────── -->
<div id="app" style="display:none;">

    <!-- Header -->
    <header class="popup-header">
        <div class="header-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="brand-name">AutoFill<span class="brand-accent">AI</span></span>
        </div>
        <div class="header-actions">
            <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">
                <span class="theme-icon theme-icon--light">☀</span>
                <span class="theme-icon theme-icon--dark">☽</span>
            </button>
            <button class="icon-btn" id="logout-btn" onclick="handleLogout()" title="Sign out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Tab nav -->
    <nav class="tab-nav" role="tablist">
        <button class="tab-btn tab-btn--active" role="tab" aria-selected="true"
                data-tab="extract" onclick="switchTab('extract')">
            Extract & Fill
        </button>
        <button class="tab-btn" role="tab" aria-selected="false"
                data-tab="history" onclick="switchTab('history')">
            History
        </button>
        <button class="tab-btn" role="tab" aria-selected="false"
                data-tab="preview" onclick="switchTab('preview')">
            Preview Fields
        </button>
    </nav>

    <!-- ── Tab: Extract & Fill ──────────────────────────────────────────── -->
    <div id="tab-extract" class="tab-panel">

        <!-- User info pill -->
        <div class="user-pill" id="user-pill">
            <div class="user-avatar" id="user-avatar">?</div>
            <span class="user-name" id="user-name">Loading…</span>
        </div>

        <div class="section-label">Paste raw text below</div>
        <textarea
            id="userText"
            spellcheck="false"
            placeholder="Jane Smith | jane@acme.com | +91 9876543210&#10;New York · linkedin.com/in/janesmith&#10;Senior Engineer at Stripe · IIT Delhi&#10;Skills: Python, React, AWS"
        ></textarea>

        <!-- Fill target indicator -->
        <div class="fill-target" id="fill-target">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="fill-target-text">Will fill forms on the current tab</span>
        </div>

        <div class="action-row">
            <button id="autofill-btn" class="btn btn--primary" onclick="handleExtractAndFill()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                Extract & Fill Page
            </button>
            <div id="loading-spinner" class="spinner" style="display:none;"></div>
        </div>

        <!-- Fill result summary -->
        <div id="fill-result" class="fill-result" style="display:none;"></div>

    </div>

    <!-- ── Tab: History ─────────────────────────────────────────────────── -->
    <div id="tab-history" class="tab-panel" style="display:none;">
        <div class="section-label">Recent saves</div>
        <div id="history-list" class="history-list">
            <div class="history-empty">Loading history…</div>
        </div>
    </div>

    <!-- ── Tab: Preview Fields ──────────────────────────────────────────── -->
    <div id="tab-preview" class="tab-panel" style="display:none;">
        <div class="section-label">Last extracted values</div>
        <div id="preview-fields" class="preview-fields">
            <p class="history-empty">Run an extraction first.</p>
        </div>
        <div class="action-row" id="preview-save-row" style="display:none;">
            <button class="btn btn--primary" onclick="saveFromPreview()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                </svg>
                Save to Firebase
            </button>
        </div>
    </div>

</div>
<!-- end #app -->

<script src="popup.js" type="module"></script>
</body>
</html>
